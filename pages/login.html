<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Diário Fitness</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="app">
    <h2>Entrar</h2>

    <label>Usuário</label>
    <input type="text" id="usuario" placeholder="Ex: vanessa">

    <button onclick="entrar()">Entrar</button>
  </div>

  <script>
    function entrar() {
      const nome = document.getElementById("usuario").value.trim();
      if (!nome) {
        alert("Digite um nome");
        return;
      }
      localStorage.setItem("usuarioLogado", nome);
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
