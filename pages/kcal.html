<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle calórico diário</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body data-page="interna">

  <div class="app">

    <h2>Controle calórico diário 🍎</h2>
    <p class="subtitle">
      Registro simples de alimentos consumidos no dia.
    </p>

    <div class="kcal-box">

      <label>Alimento</label>
      <select id="nomeAlimento"></select>

      <label>Quantidade (g)</label>
      <input type="number" id="gramas" placeholder="Ex: 120">

      <button type="button" onclick="adicionarAlimento()">
        Adicionar
      </button>

    </div>

    <div class="novo-alimento-box">
  <h3>Adicionar novo alimento ➕</h3>

  <input
    type="text"
    id="novoNome"
    placeholder="Nome do alimento"
  >

  <input
    type="number"
    id="novoKcal"
    placeholder="kcal por 100g"
  >

  <button onclick="salvarNovoAlimento()">
    Salvar alimento
  </button>
</div>

    <div class="resumo-kcal">
      Total do dia<br>
      <span id="totalKcal">0</span> kcal
    </div>

    <div id="listaKcal"></div>

    <a class="voltar" href="../index.html">⬅ Voltar</a>

  </div>

  <button class="btn-limpar" onclick="limparDia()">
  🧹 Limpar consumo de hoje
</button>

  <canvas id="graficoKcal" height="200"></canvas>
  
  <script src="../js/script.js"></script>
</body>
</html>
