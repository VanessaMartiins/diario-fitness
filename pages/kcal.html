<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle calórico diário</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body data-page="interna">

  <div class="app">

    <h2>Controle calórico diário 🍎</h2>
    <p class="subtitle">
      Registro simples de alimentos consumidos no dia.
    </p>

    <div class="kcal-box">

      <label>Alimento</label>
      <input type="text" id="alimento" placeholder="Ex: Arroz">

      <label>Quantidade (g)</label>
      <input type="number" id="gramas" placeholder="Ex: 120">

      <label>kcal por 100g</label>
      <input type="number" id="kcal100" placeholder="Ex: 130">

      <button type="button" onclick="adicionarAlimento()">Adicionar</button>

    </div>

    <div class="resumo-kcal">
      Total do dia<br>
      <span id="totalKcal">0</span> kcal
    </div>

    <div id="listaAlimentos"></div>

    <a class="voltar" href="../index.html">⬅ Voltar</a>

  </div>

  <script src="../js/script.js"></script>
</body>
</html>
