<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cálculo saudável</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body data-page="calculo">

  <div class="app">

    <!-- MENU -->
    <nav class="menu">
      <a href="../index.html">Início</a>
      <a href="calculo.html">Cálculo saudável</a>
      <a href="meta.html">Meta semanal</a>
      <a href="refeicoes.html">Refeições</a>

    </nav>

    <!-- CONTEÚDO -->
    <h2>Cálculo de referência saudável ⚖️</h2>

    <label for="altura">Altura (cm ou m)</label>
    <input
      type="text"
      id="altura"
      placeholder="Ex: 165 ou 1,65"
    >

    <label for="peso">Peso (kg)</label>
    <input
      type="text"
      id="peso"
      placeholder="Ex: 65 ou 65,5"
    >

    <button onclick="calcularIMC()">Calcular</button>

    <p id="resultado"></p>

    <p class="aviso">
      ℹ️ Valores apenas informativos. Consulte profissionais de saúde.
    </p>
