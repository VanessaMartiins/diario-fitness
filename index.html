<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Diário Fitness</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="home">

  <div class="app">

    <header class="header">
      <h1>Diário Fitness 🌱</h1>
      <p class="subtitle">
        Projeto pessoal de acompanhamento de hábitos
      </p>
    </header>

    <!-- 🔐 LOGIN (sempre existe, mas pode ser escondido) -->
    <div id="area-login" class="acoes-site">
      <a href="pages/login.html" class="btn-principal">
        🔐 Entrar / Criar usuário
      </a>
    </div>

    <!-- 👤 ÁREA DO USUÁRIO (só aparece logado) -->
    <div id="area-usuario" style="display:none">

      <p class="subtitle">
        👋 Olá, <strong id="nomeUsuario"></strong>
      </p>

      <nav class="menu">
        <a href="pages/calculo.html">Cálculo saudável</a>
        <a href="pages/metas.html">Meta semanal</a>
        <a href="pages/refeicoes.html">Refeições</a>
        <a href="pages/sobre.html">Sobre</a>
      </nav>

      <div class="acoes-site">
        <a href="pages/kcal.html" class="btn-principal">
          🍎 Controle calórico diário
        </a>
      </div>

      <div class="acoes-site">
        <button onclick="logout()" class="btn-secundario">
          🚪 Sair
        </button>
      </div>

    </div>

    <div class="alerta">
      ⚠️ Este site não tem finalidade médica.
      O acompanhamento médico é essencial.
    </div>

    <footer class="footer">
      Projeto pessoal · Vanessa Gomes
    </footer>

  </div>

  <script src="js/script.js"></script>

  <script>
  const usuario = localStorage.getItem("usuarioLogado");

  if (!usuario) {
    window.location.href = "pages/login.html";
  }
</script>
</body>
</html>
